<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREVIA — Vintage Watches & Jewellery</title>
    <!-- SEO -->

    <meta name="description" content="PREVIA Vintage — curated vintage watches & jewellery.">

    <!-- Open Graph -->

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PREVIA">
    <meta property="og:title" content="PREVIA Vintage">
    <meta property="og:description" content="Vintage Watches & Jewellery">
    <meta property="og:url" content="https://previa-vintage.shop">
    <meta property="og:image" content="https://previa-vintage.shop/images/share-banner.jpg">

    <!-- Twitter -->

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PREVIA Vintage">
    <meta name="twitter:description" content="Vintage Watches & Jewellery">
    <meta name="twitter:image" content="https://previa-vintage.shop/images/share-banner.jpg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
<img
    src="images/banner.jpg"
    alt="Previa Vintage"
    class="banner-image"
>
        <p class="subtitle">Vintage Watches & Jewellery</p>

        <div class="gold-divider"></div>
        
        </div>
    <div id="search-container">
    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Пошук товару..."
        onfocus="Search.enterSearchMode()"
        oninput="Search.handleInput(this.value)"
    >
</div>    

<div id="main-screen">

<div class="home-container">

    <button
        class="home-btn"
        onclick="goHome()"
    >
        ⌘ Home
    </button>

    <button
        class="home-btn"
        onclick="showFavorites()"
    >
        ♡ Favorites
    </button>

</div>

      <div class="categories" id="categories">

      <div class="card" id="new-count" onclick="showNewProducts()">
        🆕 NEW
</div>

      <div class="card" id="watches-count" onclick="showWatches()">
        WATCHES
</div>

      <div class="card" id="jewelry-count" onclick="showJewelry()">
        JEWELRY
</div>

      <div class="card" onclick="showAccessories()">

      <div class="category-title">BAGS</div>

</div>

<div class="card" onclick="showComingSoon('GLASSES')">

    <div class="category-title">GLASSES</div>

</div>

<div class="card" onclick="showComingSoon('APPAREL')">

    <div class="category-title">APPAREL</div>

</div>

<div class="card" onclick="showComingSoon('ARTWORK')">

    <div class="category-title">ART</div>

</div>

<div class="card" onclick="showComingSoon('DECOR')">

    <div class="category-title">DECOR</div>

</div>

      <div class="card" onclick="showSale()">

      <div class="category-title">SALE</div>

</div>

</div>

<div id="home-new-products"></div>

<div id="content"></div>

</div>

<div id="search-screen">

    <div id="search-message">

        Пошук за назвою, брендом або SKU.

    </div>

    <div id="search-suggestions"></div>

    <div id="search-results"></div>

</div>

<button id="scrollTopBtn" onclick="scrollToTop()">
</button>

<button id="backBtn" onclick="handleBackButton()">
    ←
</button>

<div
    id="lightbox"
    class="lightbox"
    onclick="closeLightbox()">

    <span
    id="lightboxClose"
    class="close-lightbox"
    onclick="event.stopPropagation(); closeLightbox()">
    </span>

    <img
        id="lightbox-image"
        class="lightbox-image"
        src=""
        alt=""
        onclick="event.stopPropagation()"
    >

    <button
    id="lightboxPrev"
    class="lightbox-prev"
    onclick="event.stopPropagation(); previousImage()">
</button>

<button
    id="lightboxNext"
    class="lightbox-next"
    onclick="event.stopPropagation(); nextImage()">
</button>

</div>

<div id="toast"></div>

<!-- =========================================
     JavaScript Modules
========================================= -->

<script src="data.js"></script>
<script src="config.js"></script>
<script src="search.js"></script>
<script src="navigation.js"></script>
<script src="gallery.js"></script>
<script src="product.js"></script>
<script src="related.js"></script>
<script src="card.js"></script>
<script src="icons.js"></script>
<script src="share.js"></script>
<script src="toast.js"></script>
<script src="catalog.js"></script>
<script src="home.js"></script>
<script src="favorites.js"></script>
<script src="favorites-page.js"></script>
<script src="app.js"></script>

</body>
</html>
