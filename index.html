<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previa Vintage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
<img
    src="images/banner.jpg"
    alt="Previa Vintage"
    class="banner-image"
>
        <p class="subtitle">Вінтажні годинники та прикраси з історією</p>
        </div>
    <div id="search-container">
    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Пошук товару..."
        onkeyup="globalSearch()"
    >
</div>    

        <div class="categories" id="categories">

            <div class="card"id="watches-count"onclick="showWatches()">⌚ Годинники</div>

            <div class="card"id="jewelry-count"onclick="showJewelry()">💍 Прикраси</div>

            <div class="card" onclick="showAccessories()">🎩 Аксесуари</div>

            <div class="card" onclick="showSale()">🏷️ Sale</div>

            <div class="card"id="new-count"onclick="showNewProducts()">🆕 Нові надходження</div>

        </div>
<div id="content"></div>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
