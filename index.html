<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previa Vintage</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>PREVIA VINTAGE</h1>

        <p class="subtitle">
            Вінтажні годинники, аксесуари та предмети інтер'єру
        </p>

        <div class="categories" id="categories">

            <div class="card"id="watches-count"onclick="showWatches()">⌚ Годинники</div>

            <div class="card"id="jewelry-count"onclick="showJewelry()">💍 Прикраси</div>

            <div class="card">🎩 Аксесуари</div>

            <div class="card">🏺 Декор</div>

            <div class="card">🔥 Sale</div>

            <div class="card"id="new-count"onclick="showNewProducts()">🆕 Нові надходження</div>

        </div>

    </div>
    <div id="search-container">
    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Пошук товару..."
        onkeyup="globalSearch()"
    >
</div>    
<div id="content"></div>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
